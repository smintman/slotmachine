<html>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <meta name="description" content="">
  <meta name="author" content="Tim Dunne">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="style.css" rel="stylesheet">
  <title>Slot Machine</title>
<head>
 
    <script>
        function toggle_job()
        {
    
      fetch("/api/toggle_Job",
        {
            method: "POST",
            headers: {
          "accept": "application/json",
            },
        })
        .then((response) => response.json())
        .then((json) => console.log(json));
        }

        function clear_logs()
        {
    
      fetch("/api/clear_logs",
        {
            method: "POST",
            headers: {
          "accept": "application/json",
            },
        })
        .then((response) => response.json())
        .then((json) => console.log(json));
        }

       
    </script>
</head>
<body>

  <nav class="navbar navbar-expand-lg bg-body-tertiary" data-bs-theme="dark".>
    <div class="container-fluid">
      <a class="navbar-brand" href="#">Slot machine</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav">
          <li class="nav-item active">
            <a class="nav-link" href="#" onclick="toggle_job();document.location.reload();" >Toggle Jobs</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#" onclick="clear_logs();document.location.reload();">Clear Logs</a>
          </li>
     
        </ul>
      </div>
    </div>
  </nav>
     

  <main role="main" class="container" style="height:calc(100vh - 56px);max-width:100vw;">
    <div class="jumbotron" style="height:100%;">
      <iframe src="/api/logs" title="Logs"></iframe>
    </div>
  </main>

    

  <!-- Bootstrap JS Bundle (includes Popper) -->  
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>

</body>
</html>
