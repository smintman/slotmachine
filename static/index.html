<html>
    <title>Log viewer</title>
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script>
        function toggle_job()
        {
    
      fetch("/api/toggle_Job",
        {
            method: "POST",
            headers: {
          "accept": "application/json",
            },
        })
        .then((response) => response.json())
        .then((json) => console.log(json));
        }

        function clear_logs()
        {
    
      fetch("/api/clear_logs",
        {
            method: "POST",
            headers: {
          "accept": "application/json",
            },
        })
        .then((response) => response.json())
        .then((json) => console.log(json));
        }

       
    </script>
</head>
<body>
    <h1>Slot machine logs</h1>

    <input type="button" onclick="toggle_job();document.location.reload();" value="Toggle jobs" />
    <input type="button" onclick="clear_logs();document.location.reload();" value="Clear logs" />
    
    <code><iframe src="/api/logs" title="Logs" width="800px" height="600px" style="overflow:auto;border:0px"></iframe></code>
    

</body>
</html>
